services:
  db:
    image: mysql:8.0
    container_name: medsurvey-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-medsurvey}
      MYSQL_USER: ${DB_USERNAME:-medsurvey}
      MYSQL_PASSWORD: ${DB_PASSWORD:-medsurvey}
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsurvey-app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-medsurvey}
      DB_USERNAME: ${DB_USERNAME:-medsurvey}
      DB_PASSWORD: ${DB_PASSWORD:-medsurvey}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      CACHE_STORE: ${CACHE_STORE:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      DB_BACKUP_DIR: storage/app/backups
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  app_storage:
