name: MedSurvey Pro CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'root' }}
          MYSQL_DATABASE: medsurvey_pro_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Frontend - Run Tests
        run: npm test

      - name: Frontend - Build
        run: npm run build

      - name: Server - Install Dependencies
        run: |
          cd server
          npm ci

      - name: Server - Database Setup
        run: |
          cd server
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'mysql://root:root@localhost:3306/medsurvey_pro_test' }}

      - name: Server - Run API Tests
        run: |
          cd server
          npm test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'mysql://root:root@localhost:3306/medsurvey_pro_test' }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'medsurvey-pro-ci-jwt-secret' }}
          REFRESH_SECRET: ${{ secrets.TEST_REFRESH_SECRET || 'medsurvey-pro-ci-refresh-secret' }}
          PORT: 3001
          NODE_ENV: test

  # You can add a deployment job here later
  # deploy-to-staging:
  #   needs: build-and-test
  #   if: github.ref == 'refs/heads/main'
  #   ...
