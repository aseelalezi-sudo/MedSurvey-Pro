name: MedSurvey Pro CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  workflow_dispatch:

concurrency:
  group: medsurvey-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  backend:
    name: Backend tests and lint
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost
      BROADCAST_CONNECTION: 'null'

      JWT_SECRET: test-jwt-secret-key-for-github-actions-only
      SUPER_ADMIN_USERNAME: admin
      SUPER_ADMIN_PASSWORD: admin123

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: medsurvey_test
      DB_USERNAME: root
      DB_PASSWORD: root

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file

      LARAVEL_BYPASS_ENV_CHECK: 1

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medsurvey_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, zip
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run migrations and seeders
        run: php artisan migrate:fresh --seed

      - name: Run Laravel Pint
        run: composer run pint:test

      - name: Run Laravel tests
        run: php artisan test

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    env:
      LARAVEL_BYPASS_ENV_CHECK: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  e2e:
    name: E2E browser smoke tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:9000
      BROADCAST_CONNECTION: 'null'

      JWT_SECRET: test-jwt-secret-key-for-github-actions-only
      SUPER_ADMIN_USERNAME: admin
      SUPER_ADMIN_PASSWORD: admin123
      TEST_ADMIN_USERNAME: super_admin
      TEST_ADMIN_PASSWORD: Password123!

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: medsurvey_test
      DB_USERNAME: root
      DB_PASSWORD: root

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file

      LARAVEL_BYPASS_ENV_CHECK: 1

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medsurvey_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run migrations and seeders
        run: php artisan migrate:fresh --seed

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
