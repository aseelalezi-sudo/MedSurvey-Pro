name: MedSurvey Pro CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1

      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost

      JWT_SECRET: test-jwt-secret-key-for-github-actions-only
      SUPER_ADMIN_USERNAME: admin
      SUPER_ADMIN_PASSWORD: admin123

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: medsurvey_test
      DB_USERNAME: root
      DB_PASSWORD: root

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medsurvey_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run Migrations and Seeders
        run: php artisan migrate:fresh --seed

      - name: Run Laravel Pint
        run: composer run pint:test

      - name: Execute tests via PHPUnit/Pest
        run: php artisan test

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
