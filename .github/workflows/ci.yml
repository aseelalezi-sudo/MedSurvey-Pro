name: MedSurvey Pro CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medsurvey_pro_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Frontend - TypeScript check
        run: npx tsc --noEmit

      - name: Frontend - Run unit tests
        run: npm run test

      - name: Frontend - Build application
        run: npm run build

      - name: Server - Install dependencies
        run: |
          cd server
          npm ci

      - name: Server - Database setup and migration
        run: |
          cd server
          npx prisma generate
          npx prisma migrate deploy
          npx tsx src/utils/seed.ts
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/medsurvey_pro_test"
          REDIS_URL: "redis://localhost:6379"

      - name: Server - Run API tests
        run: |
          cd server
          npm run test
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/medsurvey_pro_test"
          JWT_SECRET: "test-secret-key-123"
          REFRESH_SECRET: "refresh-secret-key-123"
          PORT: 3001
          NODE_ENV: test
          REDIS_URL: "redis://localhost:6379"

      - name: Server - Build project
        run: |
          cd server
          npm run build

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Start server in background for E2E tests
        run: |
          cd server
          npm run dev &
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/medsurvey_pro_test"
          JWT_SECRET: "test-secret-key-123"
          REFRESH_SECRET: "refresh-secret-key-123"
          PORT: 3001
          NODE_ENV: test
          REDIS_URL: "redis://localhost:6379"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/medsurvey_pro_test"
          JWT_SECRET: "test-secret-key-123"
          REDIS_URL: "redis://localhost:6379"
        timeout-minutes: 10
