name: MedSurvey Pro CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medsurvey_pro_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: npm ci

      - name: Frontend - TypeScript check
        run: npm run typecheck

      - name: Frontend - Run unit tests
        run: npm run test

      - name: Frontend - Build application
        run: npm run build

      - name: Server - Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Server - Database setup and migration
        working-directory: server
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy
          pnpm exec tsx src/utils/seed.ts
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/medsurvey_pro_test"
          REDIS_URL: "redis://127.0.0.1:6379"

      - name: Server - Run API tests
        working-directory: server
        run: pnpm run test
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/medsurvey_pro_test"
          JWT_SECRET: "test-secret-key-123"
          REFRESH_SECRET: "refresh-secret-key-123"
          PORT: 4001
          NODE_ENV: test
          REDIS_URL: "redis://127.0.0.1:6379"

      - name: Server - Build project
        working-directory: server
        run: pnpm run build

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/medsurvey_pro_test"
          JWT_SECRET: "test-secret-key-123"
          REFRESH_SECRET: "refresh-secret-key-123"
          PORT: 4001
          VITE_API_PORT: 4001
          NODE_ENV: test
          REDIS_URL: "redis://127.0.0.1:6379"
        timeout-minutes: 10
