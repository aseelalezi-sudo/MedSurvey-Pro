version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: medsurvey-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: dev_password
      MYSQL_DATABASE: medsurvey_pro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: medsurvey-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data_dev:
